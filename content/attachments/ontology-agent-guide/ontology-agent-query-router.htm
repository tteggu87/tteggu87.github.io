<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>질문 유형별 온톨로지 에이전트 경로 탐색기</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: light-dark(rgb(255 255 255), rgb(24 24 24));
        --fg: light-dark(rgb(29 32 37), rgb(245 247 250));
        --muted: light-dark(rgb(91 99 111), rgb(175 182 192));
        --panel: light-dark(rgb(247 248 250), rgb(35 37 42));
        --panel-strong: light-dark(rgb(236 239 244), rgb(45 48 55));
        --border: light-dark(rgb(27 29 33 / 16%), rgb(255 255 255 / 15%));
        --accent: light-dark(rgb(32 111 205), rgb(132 184 255));
        --accent-fg: light-dark(rgb(255 255 255), rgb(14 20 28));
        --accent-soft: light-dark(rgb(32 111 205 / 11%), rgb(132 184 255 / 15%));
        --radius: 14px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        background: transparent;
        color: var(--fg);
        font-family: var(--font);
      }

      body {
        padding: 8px;
      }

      button {
        font: inherit;
        color: inherit;
      }

      .router {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
      }

      .note {
        margin: 0 0 12px;
        padding: 10px 12px;
        border-left: 3px solid var(--accent);
        border-radius: 0 var(--radius) var(--radius) 0;
        background: var(--accent-soft);
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .scenarios {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
        margin-bottom: 14px;
      }

      .scenario {
        appearance: none;
        min-height: 54px;
        border: 1px solid var(--border);
        border-radius: 11px;
        background: transparent;
        padding: 9px 10px;
        text-align: start;
        cursor: pointer;
      }

      .scenario:hover {
        background: var(--panel);
      }

      .scenario[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--accent-fg);
      }

      .scenario:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 2px;
      }

      .question {
        margin: 0 0 12px;
        padding: 13px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        line-height: 1.5;
      }

      .question strong {
        display: block;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .pipeline {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 7px;
        margin-bottom: 12px;
      }

      .step {
        min-width: 0;
        padding: 11px 8px;
        border: 1px solid var(--border);
        border-radius: 11px;
        background: var(--panel);
        text-align: center;
      }

      .step strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.86rem;
      }

      .step span {
        display: block;
        color: var(--muted);
        font-size: 0.77rem;
        line-height: 1.35;
      }

      .step.is-active {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .step.is-skip {
        opacity: 0.46;
      }

      .result {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }

      .result-block {
        padding: 12px 13px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .result-block strong {
        display: block;
        margin-bottom: 5px;
        font-size: 0.84rem;
        color: var(--muted);
      }

      .result-block p {
        margin: 0;
        line-height: 1.5;
      }

      @media (max-width: 680px) {
        body {
          padding: 6px;
        }

        .scenarios,
        .result {
          grid-template-columns: 1fr;
        }

        .pipeline {
          grid-template-columns: 1fr;
        }

        .step {
          text-align: start;
        }
      }
    </style>
  </head>
  <body>
    <main id="ontology-query-router" class="router">
      <p class="note">
        아래 경로는 글의 역할 분담을 설명하는 탐색기다. 특정 제품의 성능 비교나 자동 라우팅 규칙이
        아니다.
      </p>

      <div id="scenario-buttons" class="scenarios" aria-label="질문 예시 선택"></div>

      <section class="question" aria-live="polite">
        <strong>선택한 질문</strong>
        <span id="question-text"></span>
      </section>

      <section id="pipeline" class="pipeline" aria-label="질문 처리 경로"></section>

      <section class="result" aria-live="polite">
        <div class="result-block">
          <strong>우선 사용하는 구조</strong>
          <p id="primary-path"></p>
        </div>
        <div class="result-block">
          <strong>답변에 남겨야 할 근거</strong>
          <p id="evidence-path"></p>
        </div>
      </section>
    </main>

    <script>
      ;(() => {
        const root = document.getElementById("ontology-query-router")
        if (!root) return

        let resizeFrameRequest = 0
        let lastFrameHeight = 0

        function reportHeight() {
          cancelAnimationFrame(resizeFrameRequest)
          resizeFrameRequest = requestAnimationFrame(() => {
            const style = getComputedStyle(document.body)
            const padding =
              (Number.parseFloat(style.paddingTop) || 0) +
              (Number.parseFloat(style.paddingBottom) || 0)
            const height = Math.ceil(root.getBoundingClientRect().height + padding + 2)
            const frame = window.frameElement
            if (frame?.tagName === "IFRAME" && Math.abs(height - lastFrameHeight) > 1) {
              lastFrameHeight = height
              frame.style.height = `${height}px`
            }
          })
        }

        const steps = [
          ["문서 검색", "관련 원문·문장"],
          ["개체 연결", "용어·식별자 정규화"],
          ["그래프 탐색", "명시적 관계 경로"],
          ["정책 검증", "권한·금지·필수 조건"],
          ["LLM 설명", "근거 범위 안의 서술"],
        ]

        const scenarios = [
          {
            label: "보고서 요약",
            question: "베어링 고장 보고서를 요약해줘.",
            active: [1, 0, 0, 0, 1],
            primary: "문서·벡터 검색으로 관련 원문을 찾고 LLM이 내용을 압축한다.",
            evidence:
              "사용한 보고서와 인용 구간. 용어 통일이 필요하면 개체 연결을 보조로 사용한다.",
          },
          {
            label: "영향 설비와 조치",
            question: "이 고장에 영향받는 설비와 필수 조치는 무엇인가?",
            active: [1, 1, 1, 1, 1],
            primary:
              "문서에서 사건을 찾은 뒤 개체를 정규화하고 `고장 → 설비 → 조치` 관계를 탐색한다.",
            evidence: "선택한 고장 개체, 관계 경로, 필수 조치 규칙과 원출처.",
          },
          {
            label: "권한 검사",
            question: "권한 없는 사용자가 이 조치를 실행해도 되는가?",
            active: [0, 1, 0, 1, 1],
            primary: "역할·행동·대상의 식별자를 맞춘 뒤 결정론적 정책 검증을 우선한다.",
            evidence: "사용자 역할, 요청 행동, 적용 정책 버전, 허용·금지 판정 근거.",
          },
          {
            label: "다중 홉 영향",
            question: "A 공급업체 부품을 쓴 설비에서 발생한 사고를 찾아줘.",
            active: [1, 1, 1, 0, 1],
            primary:
              "후보 문서를 찾고 `공급업체 → 부품 → 설비 → 사고`의 여러 홉을 명시적으로 탐색한다.",
            evidence: "각 홉의 관계와 개체 식별자, 관계별 출처와 유효 시점.",
          },
        ]

        const buttons = root.querySelector("#scenario-buttons")
        const pipeline = root.querySelector("#pipeline")
        const questionText = root.querySelector("#question-text")
        const primaryPath = root.querySelector("#primary-path")
        const evidencePath = root.querySelector("#evidence-path")

        steps.forEach(([title, copy]) => {
          const node = document.createElement("div")
          node.className = "step"
          node.innerHTML = `<strong>${title}</strong><span>${copy}</span>`
          pipeline.appendChild(node)
        })

        function render(index) {
          const scenario = scenarios[index]
          Array.from(buttons.children).forEach((button, buttonIndex) => {
            button.setAttribute("aria-pressed", String(buttonIndex === index))
          })
          Array.from(pipeline.children).forEach((node, stepIndex) => {
            const active = Boolean(scenario.active[stepIndex])
            node.classList.toggle("is-active", active)
            node.classList.toggle("is-skip", !active)
          })
          questionText.textContent = scenario.question
          primaryPath.textContent = scenario.primary
          evidencePath.textContent = scenario.evidence
          reportHeight()
          window.setTimeout(reportHeight, 50)
        }

        scenarios.forEach((scenario, index) => {
          const button = document.createElement("button")
          button.type = "button"
          button.className = "scenario"
          button.textContent = scenario.label
          button.setAttribute("aria-pressed", String(index === 0))
          button.addEventListener("click", () => render(index))
          buttons.appendChild(button)
        })

        render(0)
        window.setTimeout(reportHeight, 0)
        window.setTimeout(reportHeight, 250)
        window.setTimeout(reportHeight, 750)
      })()
    </script>
  </body>
</html>
