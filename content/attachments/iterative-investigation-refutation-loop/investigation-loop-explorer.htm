<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>반복 조사 루프 탐색기</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f4ea;
        --panel: #fffdf7;
        --ink: #14243a;
        --muted: #657080;
        --line: #cfd6d8;
        --accent: #287f78;
        --accent-soft: #dcefeb;
        --warn: #c25f49;
        --warn-soft: #f5dfd9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111820;
          --panel: #18222c;
          --ink: #edf3f4;
          --muted: #a9b6bf;
          --line: #394754;
          --accent: #63c5bb;
          --accent-soft: #203f3c;
          --warn: #f09a84;
          --warn-soft: #432b29;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }
      body {
        overflow: hidden;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      .intro {
        display: grid;
        grid-template-columns: 1.35fr 0.65fr;
        gap: 18px;
        align-items: start;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
      }
      h1 {
        font-size: 1.45rem;
        margin: 0 0 8px;
      }
      h2 {
        font-size: 1.05rem;
        margin: 0 0 12px;
      }
      p {
        line-height: 1.65;
        margin: 8px 0;
      }
      .muted {
        color: var(--muted);
        font-size: 0.92rem;
      }
      .steps {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
        margin: 20px 0;
      }
      .step {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        border-radius: 14px;
        min-height: 68px;
        padding: 9px 6px;
        font: inherit;
        cursor: pointer;
      }
      .step[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent-soft);
        font-weight: 700;
      }
      .scenario-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      label.toggle {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        line-height: 1.45;
      }
      input {
        margin-top: 3px;
      }
      .state-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }
      .state {
        border-left: 4px solid var(--accent);
        background: var(--panel);
        border-radius: 12px;
        padding: 14px;
        min-height: 112px;
      }
      .state strong {
        display: block;
        margin-bottom: 6px;
      }
      .decision {
        margin-top: 16px;
        padding: 16px;
        border-radius: 16px;
        background: var(--accent-soft);
        border: 1px solid var(--accent);
      }
      .decision.warn {
        background: var(--warn-soft);
        border-color: var(--warn);
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 9px;
        background: var(--accent);
        color: white;
        font-size: 0.82rem;
        font-weight: 700;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      .legend span {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 0.82rem;
      }
      @media (max-width: 720px) {
        main {
          padding: 16px;
        }
        .intro,
        .state-grid {
          grid-template-columns: 1fr;
        }
        .steps {
          grid-template-columns: repeat(2, 1fr);
        }
        .scenario-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main id="explorer">
      <section class="intro">
        <div class="panel">
          <h1>반복 조사 루프는 무엇을 바꾸는가</h1>
          <p>
            단계를 누르고 근거 상황을 바꾸면 <strong>가설·미지·다음 검색·종료 이유</strong>가 어떻게
            달라지는지 확인할 수 있습니다.
          </p>
          <p class="muted">설명용 시나리오이며 성능 수치나 자동 승인 임계값이 아닙니다.</p>
        </div>
        <aside class="panel">
          <span class="badge" id="statusBadge">재검색 필요</span>
          <p id="statusText">반대 근거와 미지가 남아 있어 결론을 확정하지 않습니다.</p>
        </aside>
      </section>

      <nav class="steps" aria-label="조사 단계">
        <button type="button" class="step" data-step="0" aria-pressed="true">
          1<br />초기 가설
        </button>
        <button type="button" class="step" data-step="1" aria-pressed="false">
          2<br />지지 근거
        </button>
        <button type="button" class="step" data-step="2" aria-pressed="false">
          3<br />반대 근거
        </button>
        <button type="button" class="step" data-step="3" aria-pressed="false">4<br />미지</button>
        <button type="button" class="step" data-step="4" aria-pressed="false">
          5<br />다음 검색
        </button>
        <button type="button" class="step" data-step="5" aria-pressed="false">6<br />수정</button>
        <button type="button" class="step" data-step="6" aria-pressed="false">
          7<br />종료·보류
        </button>
      </nav>

      <section class="panel">
        <h2>근거 상황 바꾸기</h2>
        <div class="scenario-grid">
          <label class="toggle"
            ><input id="support" type="checkbox" checked /> 독립된 지지 근거가 확보됨</label
          >
          <label class="toggle"
            ><input id="counter" type="checkbox" checked /> 중요한 반대 근거가 발견됨</label
          >
          <label class="toggle"
            ><input id="unknown" type="checkbox" checked /> 결론을 가르는 미지가 남음</label
          >
          <label class="toggle"><input id="budget" type="checkbox" /> 조사 예산이 소진됨</label>
          <label class="toggle"><input id="risk" type="checkbox" /> 비가역적·고위험 판단임</label>
          <label class="toggle"
            ><input id="regression" type="checkbox" /> 수정 과정에서 기존 인용 회귀가 감지됨</label
          >
        </div>
      </section>

      <section class="state-grid" aria-live="polite">
        <div class="state"><strong>hypothesis</strong><span id="hypothesisText"></span></div>
        <div class="state"><strong>support</strong><span id="supportText"></span></div>
        <div class="state"><strong>counterevidence</strong><span id="counterText"></span></div>
        <div class="state"><strong>unknown</strong><span id="unknownText"></span></div>
        <div class="state"><strong>next_query</strong><span id="queryText"></span></div>
        <div class="state"><strong>revision</strong><span id="revisionText"></span></div>
      </section>

      <section id="decision" class="decision" aria-live="polite">
        <strong>stop_reason</strong>
        <p id="decisionText"></p>
        <div class="legend">
          <span>잠정 판단</span><span>재검색</span><span>ABSTAIN</span><span>사람 검토</span>
        </div>
      </section>
    </main>
    <script>
      const steps = [...document.querySelectorAll(".step")]
      const controls = ["support", "counter", "unknown", "budget", "risk", "regression"].map((id) =>
        document.getElementById(id),
      )
      let activeStep = 0
      let lastHeight = 0
      let resizeRequest = 0

      function reportHeight() {
        cancelAnimationFrame(resizeRequest)
        resizeRequest = requestAnimationFrame(() => {
          const root = document.getElementById("explorer")
          const height = Math.ceil(root.getBoundingClientRect().height + 2)
          const frame = window.frameElement
          if (frame?.tagName === "IFRAME" && Math.abs(height - lastHeight) > 1) {
            lastHeight = height
            frame.style.height = `${height}px`
          }
        })
      }

      function update() {
        const support = document.getElementById("support").checked
        const counter = document.getElementById("counter").checked
        const unknown = document.getElementById("unknown").checked
        const budget = document.getElementById("budget").checked
        const risk = document.getElementById("risk").checked
        const regression = document.getElementById("regression").checked

        document.getElementById("hypothesisText").textContent = counter
          ? "초기 설명은 일부 맞지만 적용 조건을 좁혀야 합니다."
          : "현재 자료에서는 초기 설명이 가장 유력합니다."
        document.getElementById("supportText").textContent = support
          ? "서로 독립된 출처가 핵심 전제를 지지합니다."
          : "직접 지지하는 독립 근거가 부족합니다."
        document.getElementById("counterText").textContent = counter
          ? "경쟁 가설 또는 적용 범위를 제한하는 자료가 있습니다."
          : "중대한 반대 근거를 아직 찾지 못했습니다. 부재가 곧 반증 부재는 아닙니다."
        document.getElementById("unknownText").textContent = unknown
          ? "두 가설을 구분할 시점·표본·버전 정보가 남아 있습니다."
          : "현재 범위에서 결론을 바꿀 핵심 미지는 확인되지 않았습니다."
        document.getElementById("queryText").textContent = unknown
          ? "현재 가설을 반복 검색하지 말고, 경쟁 가설이 예측하는 대조 사례를 찾습니다."
          : "새 검색의 예상 정보가치를 계산하고 필요할 때만 진행합니다."
        document.getElementById("revisionText").textContent = regression
          ? "기존 확정 주장과 인용이 손상됐습니다. 수정본을 채택하지 않고 이전 상태로 되돌립니다."
          : counter
            ? "주장의 강도를 낮추고 반대 근거가 적용되는 조건을 추가합니다."
            : "새 근거가 이전 판단을 바꾸지 않아 상태를 유지합니다."

        let badge = "잠정 판단"
        let text = "필수 근거와 반례 상태를 기록한 조건부 결론을 냅니다."
        let warn = false
        if (risk) {
          badge = "사람 검토"
          text = "고위험·비가역적 판단이므로 자동 결론을 중단하고 사람 승인으로 넘깁니다."
          warn = true
        } else if (regression) {
          badge = "회귀 차단"
          text = "수정이 기존 근거와 인용을 훼손해 이전 상태를 복원하고 회귀 원인을 조사합니다."
          warn = true
        } else if (budget && (unknown || !support)) {
          badge = "ABSTAIN"
          text = "예산이 끝났지만 미지 또는 근거 부족이 남아 있어 결론을 보류합니다."
          warn = true
        } else if (unknown || !support) {
          badge = "재검색 필요"
          text = "결론을 구분할 미지나 근거 부족이 남아 있어 다음 검색을 수행합니다."
        } else if (counter) {
          badge = "조건부 판단"
          text = "반대 근거가 적용되는 조건을 명시한 뒤 제한된 결론을 냅니다."
        }

        document.getElementById("statusBadge").textContent = badge
        document.getElementById("statusText").textContent = text
        document.getElementById("decisionText").textContent = text
        document.getElementById("decision").classList.toggle("warn", warn)
        reportHeight()
        setTimeout(reportHeight, 60)
      }

      steps.forEach((button) =>
        button.addEventListener("click", () => {
          activeStep = Number(button.dataset.step)
          steps.forEach((item, index) =>
            item.setAttribute("aria-pressed", String(index === activeStep)),
          )
          update()
        }),
      )
      controls.forEach((control) => control.addEventListener("change", update))
      window.addEventListener("resize", reportHeight)
      update()
      setTimeout(reportHeight, 0)
      setTimeout(reportHeight, 250)
    </script>
  </body>
</html>
