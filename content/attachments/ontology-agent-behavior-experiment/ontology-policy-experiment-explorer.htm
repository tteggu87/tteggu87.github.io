<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>정책 실행 방식 비교 실험 탐색기</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: light-dark(rgb(29 32 37), rgb(245 247 250));
        --muted: light-dark(rgb(91 99 111), rgb(175 182 192));
        --panel: light-dark(rgb(247 248 250), rgb(35 37 42));
        --panel-strong: light-dark(rgb(236 239 244), rgb(45 48 55));
        --border: light-dark(rgb(27 29 33 / 16%), rgb(255 255 255 / 15%));
        --accent: light-dark(rgb(32 111 205), rgb(132 184 255));
        --accent-fg: light-dark(rgb(255 255 255), rgb(14 20 28));
        --accent-soft: light-dark(rgb(32 111 205 / 11%), rgb(132 184 255 / 15%));
        --series-2: light-dark(rgb(188 112 35), rgb(238 161 92));
        --radius: 14px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        background: transparent;
        color: var(--fg);
        font-family: var(--font);
      }

      body {
        padding: 8px;
      }

      button {
        font: inherit;
        color: inherit;
      }

      .explorer {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
      }

      .note {
        margin: 0 0 12px;
        padding: 10px 12px;
        border-left: 3px solid var(--accent);
        border-radius: 0 var(--radius) var(--radius) 0;
        background: var(--accent-soft);
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .group-buttons {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 10px;
      }

      .group-button,
      .layer-button {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: transparent;
        padding: 8px 9px;
        cursor: pointer;
      }

      .group-button {
        min-height: 52px;
        font-size: 0.82rem;
      }

      .group-button:hover,
      .layer-button:hover {
        background: var(--panel);
      }

      .group-button[aria-pressed="true"],
      .layer-button[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--accent-fg);
      }

      .group-button:focus-visible,
      .layer-button:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 2px;
      }

      .layer-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 13px;
      }

      .comparison {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
        margin-bottom: 12px;
      }

      .column {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .column.is-selected {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .column h3 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      .metric {
        display: grid;
        grid-template-columns: 118px minmax(0, 1fr) 54px;
        align-items: center;
        gap: 8px;
      }

      .metric + .metric {
        margin-top: 9px;
      }

      .metric-label,
      .metric-value {
        font-size: 0.84rem;
      }

      .metric-value {
        color: var(--muted);
        text-align: end;
      }

      .track {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--panel-strong);
      }

      .fill {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }

      .fill.is-false-pass {
        background: var(--series-2);
      }

      .flags {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
        margin-top: 12px;
      }

      .flag {
        padding: 8px 9px;
        border: 1px solid var(--border);
        border-radius: 9px;
        font-size: 0.82rem;
      }

      .flag strong {
        display: block;
        margin-bottom: 3px;
        color: var(--muted);
        font-size: 0.75rem;
      }

      .conclusion {
        padding: 12px 13px;
        border-left: 3px solid var(--accent);
        border-radius: 0 var(--radius) var(--radius) 0;
        background: var(--accent-soft);
        line-height: 1.5;
      }

      @media (max-width: 720px) {
        body {
          padding: 6px;
        }

        .group-buttons {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .comparison {
          grid-template-columns: 1fr;
        }

        .metric {
          grid-template-columns: 104px minmax(0, 1fr) 48px;
        }
      }
    </style>
  </head>
  <body>
    <main id="policy-experiment-explorer" class="explorer">
      <p class="note">
        수치는 합성 사례 10건에서 공동 작성 기대값과 실행 결과가 일치한 개수다. 독립 정확도나 일반
        성능 점수가 아니다.
      </p>

      <div id="group-buttons" class="group-buttons" aria-label="비교 실험군 선택"></div>
      <div id="layer-buttons" class="layer-buttons" aria-label="관찰 계층 선택"></div>

      <section class="comparison" aria-live="polite">
        <article id="baseline-column" class="column"></article>
        <article id="selected-column" class="column is-selected"></article>
      </section>

      <section id="conclusion" class="conclusion" aria-live="polite"></section>
    </main>

    <script>
      ;(() => {
        const root = document.getElementById("policy-experiment-explorer")
        if (!root) return

        let resizeFrameRequest = 0
        let lastFrameHeight = 0

        function reportHeight() {
          cancelAnimationFrame(resizeFrameRequest)
          resizeFrameRequest = requestAnimationFrame(() => {
            const style = getComputedStyle(document.body)
            const padding =
              (Number.parseFloat(style.paddingTop) || 0) +
              (Number.parseFloat(style.paddingBottom) || 0)
            const height = Math.ceil(root.getBoundingClientRect().height + padding + 2)
            const frame = window.frameElement
            if (frame?.tagName === "IFRAME" && Math.abs(height - lastFrameHeight) > 1) {
              lastFrameHeight = height
              frame.style.height = `${height}px`
            }
          })
        }

        const experiments = {
          C_static: {
            label: "C_static",
            subtitle: "JSON policy v1 유지",
            match: 7,
            falsePass: 3,
            verdictChanged: false,
            traceChanged: false,
            summary: "새 요구를 실행하지 않아 관련 실패 3건을 계속 통과시켰다.",
          },
          C_rule: {
            label: "C_rule",
            subtitle: "JSON policy v2",
            match: 10,
            falsePass: 0,
            verdictChanged: true,
            traceChanged: true,
            summary: "두 참·거짓 조건을 일반 규칙으로 실제 실행해 기대 판정과 모두 일치했다.",
          },
          C_lexical_card: {
            label: "C_lexical_card",
            subtitle: "검색 카드 + requirements",
            match: 10,
            falsePass: 0,
            verdictChanged: true,
            traceChanged: true,
            summary:
              "검색된 카드의 구조화 요구조건 배열을 소비자 코드가 실행해 같은 판정을 만들었다.",
          },
          C_metadata_only: {
            label: "C_metadata_only",
            subtitle: "SHACL label만 변경",
            match: 7,
            falsePass: 3,
            verdictChanged: false,
            traceChanged: false,
            summary: "평가기가 읽지 않는 metadata 변경은 이 평가기의 출력에 영향을 주지 않았다.",
          },
          C_redundant_shape: {
            label: "C_redundant_shape",
            subtitle: "기존 shape 중복",
            match: 7,
            falsePass: 3,
            verdictChanged: false,
            traceChanged: true,
            summary:
              "PASS/FAIL 벡터는 같았지만 위반 사례의 validation trace가 1개에서 2개로 늘었다.",
          },
          T_shacl: {
            label: "T_shacl",
            subtitle: "deep-research SHACL shape",
            match: 10,
            falsePass: 0,
            verdictChanged: true,
            traceChanged: true,
            summary: "새 두 조건을 SHACL 검증 정책으로 실행해 기대 판정과 모두 일치했다.",
          },
        }

        const comparisonKeys = [
          "C_rule",
          "C_lexical_card",
          "C_metadata_only",
          "C_redundant_shape",
          "T_shacl",
        ]
        const layers = [
          ["verdict", "최종 PASS/FAIL"],
          ["trace", "판정 근거·trace"],
        ]
        let selectedKey = "C_rule"
        let selectedLayer = "verdict"

        const groupButtons = root.querySelector("#group-buttons")
        const layerButtons = root.querySelector("#layer-buttons")
        const baselineColumn = root.querySelector("#baseline-column")
        const selectedColumn = root.querySelector("#selected-column")
        const conclusion = root.querySelector("#conclusion")

        comparisonKeys.forEach((key) => {
          const item = experiments[key]
          const button = document.createElement("button")
          button.type = "button"
          button.className = "group-button"
          button.innerHTML = `<strong>${item.label}</strong><br /><span>${item.subtitle}</span>`
          button.dataset.key = key
          button.setAttribute("aria-pressed", String(key === selectedKey))
          button.addEventListener("click", () => {
            selectedKey = key
            render()
          })
          groupButtons.appendChild(button)
        })

        layers.forEach(([key, label]) => {
          const button = document.createElement("button")
          button.type = "button"
          button.className = "layer-button"
          button.textContent = label
          button.dataset.layer = key
          button.setAttribute("aria-pressed", String(key === selectedLayer))
          button.addEventListener("click", () => {
            selectedLayer = key
            render()
          })
          layerButtons.appendChild(button)
        })

        function columnMarkup(item, title) {
          return `
            <h3>${title}: ${item.label}</h3>
            <div class="metric">
              <span class="metric-label">기대값 일치</span>
              <span class="track" aria-hidden="true"><span class="fill" style="width:${item.match * 10}%"></span></span>
              <span class="metric-value">${item.match}/10</span>
            </div>
            <div class="metric">
              <span class="metric-label">새 조건 false pass</span>
              <span class="track" aria-hidden="true"><span class="fill is-false-pass" style="width:${(item.falsePass / 3) * 100}%"></span></span>
              <span class="metric-value">${item.falsePass}</span>
            </div>
            <div class="flags">
              <div class="flag"><strong>PASS/FAIL 변화</strong>${item.verdictChanged ? "있음" : "없음"}</div>
              <div class="flag"><strong>판정 근거 변화</strong>${item.traceChanged ? "있음" : "없음"}</div>
              <div class="flag"><strong>새 프로세스 재현</strong>통과</div>
              <div class="flag"><strong>v1 재로드 복원</strong>통과</div>
            </div>
          `
        }

        function render() {
          const baseline = experiments.C_static
          const selected = experiments[selectedKey]
          Array.from(groupButtons.children).forEach((button) => {
            button.setAttribute("aria-pressed", String(button.dataset.key === selectedKey))
          })
          Array.from(layerButtons.children).forEach((button) => {
            button.setAttribute("aria-pressed", String(button.dataset.layer === selectedLayer))
          })

          baselineColumn.innerHTML = columnMarkup(baseline, "기준선")
          selectedColumn.innerHTML = columnMarkup(selected, "선택군")

          let text = selected.summary
          if (selectedLayer === "verdict") {
            if (selected.verdictChanged) {
              text += " 최종 판정 계층에서는 새 요구조건을 실제로 실행한 것이 차이를 만들었다."
            } else {
              text += " 최종 판정 계층에서는 기준선과 같은 벡터를 유지했다."
            }
          } else if (selected.traceChanged && !selected.verdictChanged) {
            text +=
              " 이 선택군은 최종 판정이 같아도 판정 근거 계층에서는 변화를 관찰할 수 있음을 보여준다."
          } else if (selected.traceChanged) {
            text += " 판정 변화와 함께 검증 근거도 달라졌다."
          } else {
            text += " 판정 근거 계층에서도 기준선과 차이가 없었다."
          }
          conclusion.textContent = text
          reportHeight()
          window.setTimeout(reportHeight, 50)
        }

        render()
        window.setTimeout(reportHeight, 0)
        window.setTimeout(reportHeight, 250)
        window.setTimeout(reportHeight, 750)
      })()
    </script>
  </body>
</html>
