<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>로컬 온톨로지 에이전트 구성 선택기</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: light-dark(rgb(29 32 37), rgb(245 247 250));
        --muted: light-dark(rgb(91 99 111), rgb(175 182 192));
        --panel: light-dark(rgb(247 248 250), rgb(35 37 42));
        --panel-strong: light-dark(rgb(236 239 244), rgb(45 48 55));
        --border: light-dark(rgb(27 29 33 / 16%), rgb(255 255 255 / 15%));
        --accent: light-dark(rgb(32 111 205), rgb(132 184 255));
        --accent-fg: light-dark(rgb(255 255 255), rgb(14 20 28));
        --accent-soft: light-dark(rgb(32 111 205 / 11%), rgb(132 184 255 / 15%));
        --series-2: light-dark(rgb(188 112 35), rgb(238 161 92));
        --series-3: light-dark(rgb(57 142 93), rgb(105 211 148));
        --radius: 14px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        background: transparent;
        color: var(--fg);
        font-family: var(--font);
      }

      body {
        padding: 8px;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button,
      select {
        color: inherit;
      }

      .explorer {
        width: 100%;
        max-width: 920px;
        margin: 0 auto;
      }

      .note,
      .recommendation {
        border-left: 3px solid var(--accent);
        border-radius: 0 var(--radius) var(--radius) 0;
        background: var(--accent-soft);
      }

      .note {
        margin: 0 0 12px;
        padding: 10px 12px;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .presets {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .preset {
        min-height: 38px;
        padding: 7px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        cursor: pointer;
      }

      .preset[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--accent-fg);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 12px;
      }

      .panel {
        padding: 13px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .panel h3,
      .recommendation h3 {
        margin: 0 0 11px;
        font-size: 1rem;
      }

      .control + .control {
        margin-top: 12px;
      }

      .control label,
      .toggle-label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.88rem;
        font-weight: 600;
      }

      select {
        width: 100%;
        min-height: 40px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
      }

      .toggles {
        display: grid;
        gap: 8px;
        margin-top: 13px;
      }

      .toggle {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 9px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .toggle input {
        margin: 3px 0 0;
        accent-color: var(--accent);
      }

      .toggle span {
        font-size: 0.86rem;
        line-height: 1.45;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 13px;
      }

      .metric {
        padding: 9px;
        border: 1px solid var(--border);
        border-radius: 11px;
        background: var(--panel);
      }

      .metric span {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 0.76rem;
      }

      .track {
        display: block;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--panel-strong);
      }

      .fill {
        display: block;
        height: 100%;
        border-radius: inherit;
        transition: width 180ms ease;
      }

      .fill.standard {
        background: var(--accent);
      }

      .fill.operations {
        background: var(--series-2);
      }

      .fill.explain {
        background: var(--series-3);
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 0.86rem;
      }

      .stack-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .stack-item {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 10px;
        padding: 9px 0;
        border-top: 1px solid var(--border);
      }

      .stack-item:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .stack-item strong {
        font-size: 0.84rem;
      }

      .stack-item span {
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .recommendation {
        margin-top: 12px;
        padding: 13px 14px;
      }

      .badge {
        display: inline-block;
        margin-bottom: 7px;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--accent);
        color: var(--accent-fg);
        font-size: 0.78rem;
        font-weight: 700;
      }

      .recommendation p {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.55;
      }

      @media (max-width: 720px) {
        body {
          padding: 6px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .metrics {
          grid-template-columns: 1fr;
        }

        .stack-item {
          grid-template-columns: 96px minmax(0, 1fr);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .fill {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="local-agent-explorer" class="explorer">
      <p class="note">
        이 선택기는 글의 설계 원칙을 조합한 <strong>구성 의사결정 보조 도구</strong>다. 점수는 제품
        벤치마크나 용량 한계가 아니라 상대적 설계 성향을 뜻한다.
      </p>

      <div class="presets" aria-label="권장 구성 예시">
        <button class="preset" type="button" data-preset="mvp" aria-pressed="true">
          개인용 MVP
        </button>
        <button class="preset" type="button" data-preset="service" aria-pressed="false">
          로컬 운영형
        </button>
        <button class="preset" type="button" data-preset="graph" aria-pressed="false">
          그래프 탐색형
        </button>
      </div>

      <div class="grid">
        <section class="panel" aria-label="요구 조건 설정">
          <h3>요구 조건</h3>

          <div class="control">
            <label for="deployment">배치 방식</label>
            <select id="deployment">
              <option value="python">Python 단일 사용자·단일 프로세스</option>
              <option value="service">여러 앱이 공유하는 로컬 서비스</option>
              <option value="graph">경로 탐색 중심 property graph</option>
            </select>
          </div>

          <div class="control">
            <label for="profile">필요한 의미론 수준</label>
            <select id="profile">
              <option value="taxonomy">분류·라벨·얕은 관계</option>
              <option value="rl">규칙 중심 RDFS·OWL RL</option>
              <option value="el">큰 클래스 계층·OWL EL</option>
              <option value="dl">복잡한 제약·OWL DL</option>
            </select>
          </div>

          <div class="control">
            <label for="scale">운영 규모</label>
            <select id="scale">
              <option value="prototype">작은 실험·개인 지식베이스</option>
              <option value="persistent">지속 저장·반복 질의</option>
              <option value="shared">여러 클라이언트·서비스 공유</option>
            </select>
          </div>

          <div class="toggles">
            <label class="toggle">
              <input id="audit" type="checkbox" checked />
              <span
                ><strong class="toggle-label">엄격한 감사 추적</strong>질의·그래프 버전·검증
                보고서·유도 사실을 남긴다.</span
              >
            </label>
            <label class="toggle">
              <input id="writes" type="checkbox" />
              <span
                ><strong class="toggle-label">에이전트 쓰기 허용</strong>조회와 업데이트를 분리하고
                승인을 거쳐 반영한다.</span
              >
            </label>
          </div>
        </section>

        <section class="panel" aria-live="polite">
          <h3>권장 구성</h3>

          <div class="metrics" aria-label="구성 성향 상대 지수">
            <div class="metric">
              <span>표준 충실도</span>
              <span class="track"><span id="standard-fill" class="fill standard"></span></span>
              <strong id="standard-label">보통</strong>
            </div>
            <div class="metric">
              <span>운영 복잡도</span>
              <span class="track"><span id="operations-fill" class="fill operations"></span></span>
              <strong id="operations-label">낮음</strong>
            </div>
            <div class="metric">
              <span>설명 가능성</span>
              <span class="track"><span id="explain-fill" class="fill explain"></span></span>
              <strong id="explain-label">높음</strong>
            </div>
          </div>

          <ul class="stack-list">
            <li class="stack-item"><strong>저장소</strong><span id="store-value"></span></li>
            <li class="stack-item"><strong>검증</strong><span id="validation-value"></span></li>
            <li class="stack-item"><strong>빠른 추론</strong><span id="fast-value"></span></li>
            <li class="stack-item"><strong>깊은 추론</strong><span id="deep-value"></span></li>
            <li class="stack-item"><strong>검색 보조</strong><span id="retrieval-value"></span></li>
            <li class="stack-item"><strong>배포·권한</strong><span id="security-value"></span></li>
          </ul>
        </section>
      </div>

      <section class="recommendation" aria-live="polite">
        <span id="badge" class="badge">개인용 MVP</span>
        <h3 id="recommendation-title">한 프로세스 안에서 작게 닫힌 루프부터 검증한다</h3>
        <p id="recommendation-copy"></p>
      </section>
    </main>

    <script>
      ;(() => {
        const root = document.getElementById("local-agent-explorer")
        if (!root) return

        const controls = {
          deployment: root.querySelector("#deployment"),
          profile: root.querySelector("#profile"),
          scale: root.querySelector("#scale"),
          audit: root.querySelector("#audit"),
          writes: root.querySelector("#writes"),
        }

        const elements = {
          standardFill: root.querySelector("#standard-fill"),
          operationsFill: root.querySelector("#operations-fill"),
          explainFill: root.querySelector("#explain-fill"),
          standardLabel: root.querySelector("#standard-label"),
          operationsLabel: root.querySelector("#operations-label"),
          explainLabel: root.querySelector("#explain-label"),
          store: root.querySelector("#store-value"),
          validation: root.querySelector("#validation-value"),
          fast: root.querySelector("#fast-value"),
          deep: root.querySelector("#deep-value"),
          retrieval: root.querySelector("#retrieval-value"),
          security: root.querySelector("#security-value"),
          badge: root.querySelector("#badge"),
          title: root.querySelector("#recommendation-title"),
          copy: root.querySelector("#recommendation-copy"),
        }

        const presetButtons = [...root.querySelectorAll("[data-preset]")]
        const presets = {
          mvp: {
            deployment: "python",
            profile: "rl",
            scale: "prototype",
            audit: true,
            writes: false,
          },
          service: {
            deployment: "service",
            profile: "rl",
            scale: "shared",
            audit: true,
            writes: true,
          },
          graph: {
            deployment: "graph",
            profile: "taxonomy",
            scale: "persistent",
            audit: false,
            writes: false,
          },
        }

        let resizeRequest = 0
        let lastHeight = 0

        function reportHeight() {
          cancelAnimationFrame(resizeRequest)
          resizeRequest = requestAnimationFrame(() => {
            const bodyStyle = getComputedStyle(document.body)
            const padding =
              (Number.parseFloat(bodyStyle.paddingTop) || 0) +
              (Number.parseFloat(bodyStyle.paddingBottom) || 0)
            const height = Math.ceil(root.getBoundingClientRect().height + padding + 2)
            const frame = window.frameElement
            if (frame?.tagName === "IFRAME" && Math.abs(height - lastHeight) > 1) {
              lastHeight = height
              frame.style.height = `${height}px`
            }
          })
        }

        function level(score) {
          if (score >= 76) return "매우 높음"
          if (score >= 56) return "높음"
          if (score >= 36) return "보통"
          return "낮음"
        }

        function setMetric(fill, label, score) {
          fill.style.width = `${score}%`
          label.textContent = level(score)
        }

        function clearPresetSelection() {
          presetButtons.forEach((button) => button.setAttribute("aria-pressed", "false"))
        }

        function applyPreset(name) {
          const preset = presets[name]
          if (!preset) return
          controls.deployment.value = preset.deployment
          controls.profile.value = preset.profile
          controls.scale.value = preset.scale
          controls.audit.checked = preset.audit
          controls.writes.checked = preset.writes
          presetButtons.forEach((button) =>
            button.setAttribute("aria-pressed", String(button.dataset.preset === name)),
          )
          update()
        }

        function update() {
          const deployment = controls.deployment.value
          const profile = controls.profile.value
          const scale = controls.scale.value
          const audit = controls.audit.checked
          const writes = controls.writes.checked

          let store = "Owlready2 quadstore 또는 RDFLib/pyoxigraph"
          let validation = "pySHACL로 저장 전·후 shape 검증"
          let fast = "OWL-RL 또는 작은 명시 규칙"
          let deep = "Owlready2에서 HermiT를 필요할 때만 호출"
          let retrieval = "로컬 임베딩 + FAISS를 후보 검색에만 사용"
          let security = "FastAPI를 loopback에 묶고 조회 전용으로 시작"
          let badge = "개인용 MVP"
          let title = "한 프로세스 안에서 작게 닫힌 루프부터 검증한다"
          let copy =
            "자연어를 바로 업데이트로 보내지 말고, 의도 분류 → SPARQL/SHACL/추론 → 근거와 함께 답변하는 경로를 먼저 고정한다."

          if (deployment === "service") {
            store = scale === "shared" ? "Jena TDB2 + Fuseki 또는 RDF4J NativeStore" : "Jena TDB2"
            validation = "Jena SHACL 또는 RDF4J SHACL Sail을 트랜잭션 경계에 배치"
            fast =
              profile === "el"
                ? "ELK 분류 + 저장소의 경량 추론"
                : "Jena rules 또는 RDF4J inferencer"
            deep =
              profile === "dl"
                ? "HermiT 또는 Openllet 전용 작업 큐"
                : "정합성 검사가 필요할 때만 DL reasoner 호출"
            retrieval = "로컬 벡터 인덱스를 별도 사이드카로 두고 URI를 반환"
            security = "SPARQL Query와 Update endpoint를 분리하고 로컬 인증·감사 로그 적용"
            badge = "로컬 운영형"
            title = "저장소와 추론을 서비스 경계로 나눠 여러 앱이 재사용한다"
            copy =
              "빠른 질의와 검증은 상시 경로에 두고, 깊은 DL 추론은 작업 큐나 배치로 격리하면 응답성과 의미 정확도를 함께 관리하기 쉽다."
          }

          if (deployment === "graph") {
            store = "Neo4j + n10s, 필요하면 별도 RDF 정본 저장소"
            validation = audit
              ? "n10s SHACL과 RDF-native 검증을 이중화"
              : "n10s SHACL로 적재 경계 확인"
            fast = "Cypher 경로 질의와 기본 inferencing"
            deep =
              profile === "dl"
                ? "RDF/OWL 투영본을 별도 DL reasoner로 검사"
                : "깊은 추론은 생략하거나 별도 symbolic component로 분리"
            retrieval = "그래프 이웃 탐색 + 로컬 임베딩 후보 검색"
            security = "Cypher 읽기 역할을 기본으로 두고 적재 파이프라인만 쓰기 권한 보유"
            badge = "그래프 탐색형"
            title = "경로 탐색은 property graph에 맡기되 의미 정본의 경계를 분명히 한다"
            copy =
              "운영 그래프와 탐색 UX가 우선이면 유용하지만, OWL 의미론과 엄격한 검증이 핵심이라면 별도 RDF-native 계층을 정본으로 유지하는 편이 안전하다."
          }

          if (profile === "taxonomy") {
            fast = deployment === "graph" ? fast : "RDFS 수준 분류와 명시 관계 확장"
            deep = "기본 경로에서는 사용하지 않음"
          } else if (profile === "el") {
            deep = "ELK로 큰 클래스 계층을 빠르게 분류"
          } else if (profile === "dl") {
            deep = deployment === "python" ? "HermiT 또는 Openllet을 격리 호출" : deep
          }

          if (writes) {
            security += "; 후보 변경은 staging graph → SHACL → 인간 승인 → 정본 반영 순서"
            copy += " 쓰기 권한이 있으므로 변경 제안과 실제 반영을 같은 도구 호출로 합치지 않는다."
          }

          if (audit) {
            validation += "; validation report를 보존"
            security += "; 그래프 버전·생성 질의·유도 사실을 함께 기록"
          }

          let standardScore = deployment === "graph" ? 45 : deployment === "service" ? 88 : 72
          let operationsScore = deployment === "service" ? 82 : deployment === "graph" ? 68 : 34
          let explainScore = audit ? 88 : 58

          if (profile === "dl") {
            standardScore += 8
            operationsScore += 12
            explainScore += 5
          } else if (profile === "taxonomy") {
            operationsScore -= 8
          }

          if (scale === "shared") operationsScore += 7
          if (writes) operationsScore += 8

          standardScore = Math.min(100, Math.max(8, standardScore))
          operationsScore = Math.min(100, Math.max(8, operationsScore))
          explainScore = Math.min(100, Math.max(8, explainScore))

          setMetric(elements.standardFill, elements.standardLabel, standardScore)
          setMetric(elements.operationsFill, elements.operationsLabel, operationsScore)
          setMetric(elements.explainFill, elements.explainLabel, explainScore)

          elements.store.textContent = store
          elements.validation.textContent = validation
          elements.fast.textContent = fast
          elements.deep.textContent = deep
          elements.retrieval.textContent = retrieval
          elements.security.textContent = security
          elements.badge.textContent = badge
          elements.title.textContent = title
          elements.copy.textContent = copy
          reportHeight()
          setTimeout(reportHeight, 50)
        }

        presetButtons.forEach((button) =>
          button.addEventListener("click", () => applyPreset(button.dataset.preset)),
        )

        Object.values(controls).forEach((control) => {
          control.addEventListener("change", () => {
            clearPresetSelection()
            update()
          })
        })

        const resizeObserver = new ResizeObserver(reportHeight)
        resizeObserver.observe(root)
        applyPreset("mvp")
        setTimeout(reportHeight, 250)
      })()
    </script>
  </body>
</html>
