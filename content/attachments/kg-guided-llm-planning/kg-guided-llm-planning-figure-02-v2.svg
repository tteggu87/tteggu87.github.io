<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024" role="img" aria-labelledby="title desc">
    <title id="title">캐시 장애의 계획 문맥</title><desc id="desc">관찰, 경쟁 가설, 행동 후보, 관찰과 재계획으로 이어지는 사례</desc><defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#102436"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#102436" flood-opacity="0.09"/></filter>
  </defs><rect x="0" y="0" width="1792" height="1024" rx="0" fill="#F4F0E8" stroke="none" stroke-width="0" /><text x="72" y="82" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="52" font-weight="800" fill="#102436" text-anchor="start" >캐시 장애를 계획 문맥으로 바꾸면 순서가 달라진다</text><text x="74" y="124" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="25" font-weight="500" fill="#66737A" text-anchor="start" >곧바로 설정을 바꾸지 않고, 가설을 가르는 관찰과 가역적 개입부터 배치한다</text><rect x="70" y="180" width="330" height="660" rx="26" fill="#FFFDF8" stroke="#C9C6BD" stroke-width="2" filter="url(#shadow)"/><rect x="96" y="205" width="96" height="42" rx="21" fill="#DDEBE6" stroke="none" stroke-width="0" /><text x="144" y="232.8" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#2F7D6C" text-anchor="middle" >관찰</text><text x="98" y="292" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="29" font-weight="800" fill="#102436" text-anchor="start" >새 캐시 정책 배포</text><rect x="98" y="330" width="274" height="88" rx="18" fill="#F2DDD6" stroke="none" stroke-width="0" /><text x="122" y="366" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#C65C46" text-anchor="start" >읽기 오류</text><text x="122" y="400" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="23" font-weight="800" fill="#102436" text-anchor="start" >배포 직후 급증</text><rect x="98" y="438" width="274" height="88" rx="18" fill="#F4E9C7" stroke="none" stroke-width="0" /><text x="122" y="474" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="22" font-weight="700" fill="#D5A43A" text-anchor="start" >복제본</text><text x="122" y="508" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="700" fill="#102436" text-anchor="start" >같은 시간대 지연 경고</text><rect x="98" y="552" width="274" height="218" rx="18" fill="#F4F0E8" stroke="none" stroke-width="0" /><text x="122" y="590" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="22" font-weight="800" fill="#C65C46" text-anchor="start" >정책 경계</text><text x="122" y="630" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="600" fill="#253239" text-anchor="start"><tspan x="122" dy="0">TTL은 계약 하한</tspan><tspan x="122" dy="32.550000000000004">아래로 낮출 수 없음</tspan><tspan x="122" dy="32.550000000000004">승인 없는 변경 금지</tspan></text><rect x="470" y="180" width="350" height="660" rx="26" fill="#FFFDF8" stroke="#C9C6BD" stroke-width="2" filter="url(#shadow)"/><rect x="496" y="205" width="132" height="42" rx="21" fill="#F4E9C7" stroke="none" stroke-width="0" /><text x="562" y="232.8" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#D5A43A" text-anchor="middle" >경쟁 가설</text><rect x="500" y="294" width="290" height="165" rx="20" fill="#F2DDD6" stroke="#C65C46" stroke-width="2" /><text x="526" y="337" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="800" fill="#C65C46" text-anchor="start" >가설 A</text><text x="526" y="382" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="27" font-weight="800" fill="#102436" text-anchor="start"><tspan x="526" dy="0">캐시 정책 B가</tspan><tspan x="526" dy="36.45">오류를 유발했다</tspan></text><rect x="500" y="493" width="290" height="165" rx="20" fill="#DDEBE6" stroke="#2F7D6C" stroke-width="2" /><text x="526" y="536" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="800" fill="#2F7D6C" text-anchor="start" >가설 B</text><text x="526" y="581" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="800" fill="#102436" text-anchor="start"><tspan x="526" dy="0">읽기 복제본 지연이</tspan><tspan x="526" dy="35.1">오류를 유발했다</tspan></text><rect x="500" y="690" width="290" height="98" rx="18" fill="#F4F0E8" stroke="none" stroke-width="0" /><text x="526" y="727" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#D5A43A" text-anchor="start" >미지</text><text x="526" y="762" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="600" fill="#253239" text-anchor="start" >어느 가설이 더 강한가?</text><line x1="400" y1="510" x2="470" y2="510" stroke="#102436" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" /><rect x="890" y="180" width="420" height="660" rx="26" fill="#FFFDF8" stroke="#C9C6BD" stroke-width="2" filter="url(#shadow)"/><rect x="916" y="205" width="132" height="42" rx="21" fill="#F2DDD6" stroke="none" stroke-width="0" /><text x="982" y="232.8" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#C65C46" text-anchor="middle" >행동 후보</text><rect x="920" y="286" width="360" height="132" rx="20" fill="#DDEBE6" stroke="none" stroke-width="0" /><circle cx="958" cy="328" r="23" fill="#2F7D6C" stroke="none" stroke-width="0"/><text x="958" y="336" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >1</text><text x="996" y="328" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >시간·지역 상관 확인</text><text x="996" y="368" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >정보 가치 높음 · 실행 위험 낮음</text><rect x="996" y="381" width="146" height="28" rx="14" fill="#FFFDF8" stroke="none" stroke-width="0" /><text x="1069" y="400.1" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2F7D6C" text-anchor="middle" >관찰</text><rect x="920" y="450" width="360" height="132" rx="20" fill="#F4E9C7" stroke="none" stroke-width="0" /><circle cx="958" cy="492" r="23" fill="#D5A43A" stroke="none" stroke-width="0"/><text x="958" y="500" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >2</text><text x="996" y="492" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >정상 복제본으로 우회</text><text x="996" y="532" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >가역적 개입 · 여유 용량 필요</text><rect x="996" y="545" width="146" height="28" rx="14" fill="#FFFDF8" stroke="none" stroke-width="0" /><text x="1069" y="564.1" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#D5A43A" text-anchor="middle" >되돌릴 수 있음</text><rect x="920" y="614" width="360" height="132" rx="20" fill="#F2DDD6" stroke="none" stroke-width="0" /><circle cx="958" cy="656" r="23" fill="#C65C46" stroke="none" stroke-width="0"/><text x="958" y="664" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >3</text><text x="996" y="656" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >캐시 정책 롤백</text><text x="996" y="696" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >가역적 개입 · 승인과 원본 여유 필요</text><rect x="996" y="709" width="146" height="28" rx="14" fill="#FFFDF8" stroke="none" stroke-width="0" /><text x="1069" y="728.1" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#C65C46" text-anchor="middle" >되돌릴 수 있음</text><path d="M820 376 C852 376 852 352 890 352" fill="none" stroke="#C65C46" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" /><path d="M820 576 C852 576 852 516 890 516" fill="none" stroke="#2F7D6C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" /><path d="M820 720 C852 720 852 680 890 680" fill="none" stroke="#D5A43A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" /><rect x="1380" y="180" width="342" height="660" rx="26" fill="#102436" stroke="#102436" stroke-width="0" filter="url(#shadow)"/><rect x="1408" y="205" width="140" height="42" rx="21" fill="#F4E9C7" stroke="none" stroke-width="0" /><text x="1478" y="232.46" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#D5A43A" text-anchor="middle" >관찰·재계획</text><text x="1408" y="298" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF" text-anchor="start" >무엇을 볼까?</text><rect x="1408" y="338" width="286" height="54" rx="14" fill="#284A5F" stroke="none" stroke-width="0" /><text x="1432" y="373" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="700" fill="#FFFFFF" text-anchor="start" >오류율</text><circle cx="1664" cy="365" r="8" fill="#2F7D6C" stroke="none" stroke-width="0"/><rect x="1408" y="412" width="286" height="54" rx="14" fill="#203E50" stroke="none" stroke-width="0" /><text x="1432" y="447" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="700" fill="#FFFFFF" text-anchor="start" >응답 지연</text><circle cx="1664" cy="439" r="8" fill="#2F7D6C" stroke="none" stroke-width="0"/><rect x="1408" y="486" width="286" height="54" rx="14" fill="#284A5F" stroke="none" stroke-width="0" /><text x="1432" y="521" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="700" fill="#FFFFFF" text-anchor="start" >복제본 부하</text><circle cx="1664" cy="513" r="8" fill="#D5A43A" stroke="none" stroke-width="0"/><rect x="1408" y="560" width="286" height="54" rx="14" fill="#203E50" stroke="none" stroke-width="0" /><text x="1432" y="595" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="700" fill="#FFFFFF" text-anchor="start" >원본 저장소 부하</text><circle cx="1664" cy="587" r="8" fill="#D5A43A" stroke="none" stroke-width="0"/><rect x="1408" y="665" width="286" height="116" rx="18" fill="#F2DDD6" stroke="none" stroke-width="0" /><text x="1432" y="704" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="800" fill="#C65C46" text-anchor="start" >예상과 다르면</text><text x="1432" y="744" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21" font-weight="700" fill="#102436" text-anchor="start" >첫 가설을 버리고 다시 조사</text><line x1="1310" y1="510" x2="1380" y2="510" stroke="#102436" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" /><path d="M1550 840 C1550 930 650 930 650 840" fill="none" stroke="#C65C46" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" stroke-dasharray="12 10"/><rect x="715" y="890" width="365" height="48" rx="24" fill="#F2DDD6" stroke="none" stroke-width="0" /><text x="897.5" y="920.8" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="700" fill="#C65C46" text-anchor="middle" >관찰 결과 → 가설 수정 → 계획 재편성</text>
  </svg>