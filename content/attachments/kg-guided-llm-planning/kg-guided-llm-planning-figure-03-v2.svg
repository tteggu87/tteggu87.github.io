<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024" role="img" aria-labelledby="title desc">
    <title id="title">그래프 기반 계획의 실패 표면과 통제</title><desc id="desc">다섯 위험과 대응 통제를 일대일로 연결한 구조</desc><defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#102436"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#102436" flood-opacity="0.09"/></filter>
  </defs><rect x="0" y="0" width="1792" height="1024" rx="0" fill="#F4F0E8" stroke="none" stroke-width="0" /><text x="72" y="82" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="52" font-weight="800" fill="#102436" text-anchor="start" >그래프가 틀리면 계획도 더 그럴듯하게 틀릴 수 있다</text><text x="74" y="124" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="25" font-weight="500" fill="#66737A" text-anchor="start" >그래프를 계획 전제로 쓸수록 원문·버전·상태·승인·기권 경계를 함께 설계해야 한다</text><text x="110" y="205" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="800" fill="#C65C46" text-anchor="start" >실패 표면</text><text x="1028" y="205" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="800" fill="#2F7D6C" text-anchor="start" >통제 경계</text><g transform="translate(856 162)" fill="none" stroke="#D5A43A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><path d="M42 4l32 12v24c0 23-13 38-32 48C23 78 10 63 10 40V16z"/><path d="M27 43l10 10 20-24"/></g><rect x="78" y="245" width="630" height="102" rx="20" fill="#F2DDD6" stroke="none" stroke-width="0" /><circle cx="120" cy="296" r="22" fill="#C65C46" stroke="none" stroke-width="0"/><text x="120" y="304" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >1</text><text x="158" y="283" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >잘못된 관계</text><text x="158" y="320" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="19" font-weight="500" fill="#253239" text-anchor="start" >추출 오류가 원인처럼 보임</text><rect x="1080" y="245" width="634" height="102" rx="20" fill="#DDEBE6" stroke="none" stroke-width="0" /><circle cx="1122" cy="296" r="22" fill="#2F7D6C" stroke="none" stroke-width="0"/><text x="1122" y="304" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >✓</text><text x="1160" y="283" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="23" font-weight="800" fill="#102436" text-anchor="start" >원문 위치 · 해시 · 후보 상태</text><text x="1160" y="320" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >근거를 되짚을 수 있게 보존</text><line x1="708" y1="296" x2="1080" y2="296" stroke="#102436" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><rect x="78" y="373" width="630" height="102" rx="20" fill="#F2DDD6" stroke="none" stroke-width="0" /><circle cx="120" cy="424" r="22" fill="#C65C46" stroke="none" stroke-width="0"/><text x="120" y="432" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >2</text><text x="158" y="411" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >오래된 상태·정책</text><text x="158" y="448" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="19" font-weight="500" fill="#253239" text-anchor="start" >만료된 규칙으로 행동을 제한</text><rect x="1080" y="373" width="634" height="102" rx="20" fill="#DDEBE6" stroke="none" stroke-width="0" /><circle cx="1122" cy="424" r="22" fill="#2F7D6C" stroke="none" stroke-width="0"/><text x="1122" y="432" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >✓</text><text x="1160" y="411" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="23" font-weight="800" fill="#102436" text-anchor="start" >버전 · 유효 기간 · 재검증</text><text x="1160" y="448" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >현재성 확인 후 계획에 포함</text><line x1="708" y1="424" x2="1080" y2="424" stroke="#D5A43A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><rect x="78" y="501" width="630" height="102" rx="20" fill="#F2DDD6" stroke="none" stroke-width="0" /><circle cx="120" cy="552" r="22" fill="#C65C46" stroke="none" stroke-width="0"/><text x="120" y="560" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >3</text><text x="158" y="539" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >검증되지 않은 영향</text><text x="158" y="576" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="19" font-weight="500" fill="#253239" text-anchor="start" >가설을 인과 법칙처럼 사용</text><rect x="1080" y="501" width="634" height="102" rx="20" fill="#DDEBE6" stroke="none" stroke-width="0" /><circle cx="1122" cy="552" r="22" fill="#2F7D6C" stroke="none" stroke-width="0"/><text x="1122" y="560" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >✓</text><text x="1160" y="539" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="23" font-weight="800" fill="#102436" text-anchor="start" >observed / hypothesis / validated</text><text x="1160" y="576" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >상태가 다른 관계를 구분</text><line x1="708" y1="552" x2="1080" y2="552" stroke="#102436" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><rect x="78" y="629" width="630" height="102" rx="20" fill="#F2DDD6" stroke="none" stroke-width="0" /><circle cx="120" cy="680" r="22" fill="#C65C46" stroke="none" stroke-width="0"/><text x="120" y="688" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >4</text><text x="158" y="667" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >권한 없는 실행</text><text x="158" y="704" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="19" font-weight="500" fill="#253239" text-anchor="start" >좋은 계획이 곧바로 변경으로 이어짐</text><rect x="1080" y="629" width="634" height="102" rx="20" fill="#DDEBE6" stroke="none" stroke-width="0" /><circle cx="1122" cy="680" r="22" fill="#2F7D6C" stroke="none" stroke-width="0"/><text x="1122" y="688" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >✓</text><text x="1160" y="667" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="23" font-weight="800" fill="#102436" text-anchor="start" >proposal / validation / approval</text><text x="1160" y="704" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >변경 전 사람·정책 게이트</text><line x1="708" y1="680" x2="1080" y2="680" stroke="#D5A43A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><rect x="78" y="757" width="630" height="102" rx="20" fill="#F2DDD6" stroke="none" stroke-width="0" /><circle cx="120" cy="808" r="22" fill="#C65C46" stroke="none" stroke-width="0"/><text x="120" y="816" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >5</text><text x="158" y="795" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800" fill="#102436" text-anchor="start" >그래프 누락</text><text x="158" y="832" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="19" font-weight="500" fill="#253239" text-anchor="start" >없는 사실을 내부 기억으로 메움</text><rect x="1080" y="757" width="634" height="102" rx="20" fill="#DDEBE6" stroke="none" stroke-width="0" /><circle cx="1122" cy="808" r="22" fill="#2F7D6C" stroke="none" stroke-width="0"/><text x="1122" y="816" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" >✓</text><text x="1160" y="795" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="23" font-weight="800" fill="#102436" text-anchor="start" >missing / unknown / 보류</text><text x="1160" y="832" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#253239" text-anchor="start" >모르면 멈추는 선택을 허용</text><line x1="708" y1="808" x2="1080" y2="808" stroke="#102436" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><rect x="180" y="905" width="1432" height="74" rx="20" fill="#102436" stroke="none" stroke-width="0" /><text x="896" y="937" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle" >실행 → 관찰 기록 → 실행 영수증 → 재계획</text><text x="896" y="965" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="500" fill="#D8E4EA" text-anchor="middle" >Validator는 그래프의 진실을 보장하지 않는다. 주어진 계약 안에서 금지·권한·형식을 검사한다.</text>
